<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal de preparación para certificaciones técnicas. Repasa preguntas tipo test, conceptos clave y realiza simulacros de examen.">
  <title>CertPrep - Portal de Certificaciones</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Pantalla de autenticación ─────────────────────────────────────────── -->
  <div id="auth-screen" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-brand">
        <h1 class="app-title">CertPrep</h1>
        <p class="app-subtitle">Portal de preparación para certificaciones técnicas</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Iniciar sesión</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Registrarse</button>
      </div>

      <div id="auth-login-form">
        <div class="form-group">
          <input type="email" id="auth-email" class="form-input" placeholder="Correo electrónico" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin()" />
        </div>
        <div class="form-group">
          <input type="password" id="auth-password" class="form-input" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()" />
        </div>
        <div id="auth-error" class="auth-error" style="display:none;"></div>
        <button class="btn btn-primary auth-submit" onclick="handleLogin()">Entrar</button>
      </div>

      <div id="auth-register-form" style="display:none;">
        <div class="form-group">
          <input type="text" id="auth-name" class="form-input" placeholder="Nombre (opcional)" autocomplete="name" />
        </div>
        <div class="form-group">
          <input type="email" id="auth-reg-email" class="form-input" placeholder="Correo electrónico" autocomplete="email" onkeydown="if(event.key==='Enter')handleRegister()" />
        </div>
        <div class="form-group">
          <input type="password" id="auth-reg-password" class="form-input" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleRegister()" />
        </div>
        <div id="auth-reg-error" class="auth-error" style="display:none;"></div>
        <button class="btn btn-primary auth-submit" onclick="handleRegister()">Crear cuenta</button>
      </div>
    </div>
  </div>

  <!-- ── App principal ──────────────────────────────────────────────────────── -->
  <header class="app-header" style="display:none;">
    <div class="container header-inner">
      <div class="header-brand">
        <h1 class="app-title">CertPrep</h1>
        <p class="app-subtitle">Portal de preparación para certificaciones técnicas</p>
      </div>
      <div class="header-actions">
        <span id="header-user" class="header-username"></span>
        <button class="header-btn" id="logout-btn" onclick="handleLogout()" aria-label="Cerrar sesión" title="Cerrar sesión">↩</button>
        <button class="header-btn" id="config-btn" onclick="renderConfigPanel()" aria-label="Configuración IA" title="Configuración IA">⚙️</button>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleDarkMode()" aria-label="Cambiar tema">🌙</button>
      </div>
    </div>
  </header>

  <main id="app" class="container" style="display:none;">
    <!-- Las diferentes pantallas se renderizan aquí desde script.js -->
  </main>

  <footer class="app-footer" style="display:none;">
    <div class="container">
      <p>App educativa para preparación de certificaciones técnicas</p>
    </div>
  </footer>

  <script src="api.js"></script>
  <script src="data/certifications.js"></script>
  <script src="ai-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
